<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Puzzle</title>
<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #222;
        color: white;
    }
    h1 {
        margin-top: 20px;
    }
    .puzzle {
        width: 300px;
        height: 300px;
        margin: 20px auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
    }
    .tile {
        background: #4CAF50;
        font-size: 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        border-radius: 10px;
    }
    .empty {
        background: transparent;
        cursor: default;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #ff9800;
        color: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<h1>Game Puzzle Geser</h1>
<div class="puzzle" id="puzzle"></div>
<button onclick="shuffle()">Acak</button>

<script>
let puzzle = [1,2,3,4,5,6,7,8,""];

function render() {
    const container = document.getElementById("puzzle");
    container.innerHTML = "";

    puzzle.forEach((num, index) => {
        const tile = document.createElement("div");
        tile.classList.add("tile");

        if (num === "") {
            tile.classList.add("empty");
        } else {
            tile.textContent = num;
            tile.onclick = () => move(index);
        }

        container.appendChild(tile);
    });
}

function move(index) {
    const emptyIndex = puzzle.indexOf("");

    const validMoves = [
        index - 1,
        index + 1,
        index - 3,
        index + 3
    ];

    if (validMoves.includes(emptyIndex)) {
        [puzzle[index], puzzle[emptyIndex]] = [puzzle[emptyIndex], puzzle[index]];
        render();
        checkWin();
    }
}

function shuffle() {
    puzzle.sort(() => Math.random() - 0.5);
    render();
}

function checkWin() {
    const win = [1,2,3,4,5,6,7,8,""];
    if (JSON.stringify(puzzle) === JSON.stringify(win)) {
        setTimeout(() => alert("🎉 Kamu Menang!"), 100);
    }
}

render();
</script>

</body>
</html>
